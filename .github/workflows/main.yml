name: main
run-name: ${{ github.actor }}
on:
  push:
    branches:
      - main
jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: .NET setup
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Get Version from Project File
        id: get-version
        shell: bash
        run: echo "version=$(grep -oE '<Version>[^<]+' Buildforge.App/Buildforge.App.csproj | sed 's/<Version>//')" >> $GITHUB_OUTPUT
      - name: Build project
        run: dotnet publish Buildforge.App/Buildforge.App.csproj -c Release -o publish -r win-x64 --self-contained true
      - name: Create Velopack Release
        run: |
          dotnet tool install -g vpk
          vpk [win] download github --repoUrl https://github.com/${{ github.repository }}
          vpk [win] pack -u Buildforge -v ${{ steps.get-version.outputs.version }} -p publish --channel stable --mainExe Buildforge.App.exe
          vpk [win] upload github --repoUrl https://github.com/${{ github.repository }} --publish --releaseName "Buildforge ${{ steps.get-version.outputs.version }}" --tag v${{ steps.get-version.outputs.version }}